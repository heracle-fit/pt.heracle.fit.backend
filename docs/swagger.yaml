        required: true
        type: integer
      responses:
        "200":
          description: Deleted
        "404":
          description: Log not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete a workout log
      tags:
      - Workout
    get:
      description: Returns a specific workout log by ID
      parameters:
      - description: Workout log ID
        in: path
        name: id
        required: true
