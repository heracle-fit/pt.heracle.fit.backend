      produces:
      - application/json
      responses:
        "200":
          description: Google Calendar list
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Token expired
          schema:
            additionalProperties: true
            type: object
        "404":
          description: User or token not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties: true
