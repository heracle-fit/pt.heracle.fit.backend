        "400":
          description: Invalid request body
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Save body metrics
      tags:
      - User
  /user/caltest:
    get:
      description: Fetches the Google Calendar list for the authenticated user using
