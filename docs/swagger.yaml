      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Updated workout log
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Log not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Server error
          schema:
